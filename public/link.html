<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAM Solutions - Acceso Seguro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: rgba(20, 20, 25, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
            text-align: center;
            width: 350px;
            border: 1px solid rgba(0, 150, 255, 0.1);
            position: relative;
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #0096ff 0%, #003366 100%);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px #0096ff;
        }

        h1 {
            font-size: 20px;
            margin: 10px 0;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .install-btn {
            background-color: transparent;
            color: #0096ff;
            border: 2px solid #0096ff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .install-btn:hover {
            background-color: #0096ff;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.5);
        }

        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
        }

        /* Decoración de fondo */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="bg-glow"></div>
        <div class="logo-container">
            <div class="logo-circle">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
        </div>
        <h1>EAM Solutions</h1>
        <p>Sistema de Diagnóstico Remoto V1.0</p>

        <button class="install-btn" onclick="startInstall()">Acceder e Instalar</button>

        <div class="status" id="status">Esperando conexión...</div>
    </div>

    <script>
        function startInstall() {
            const status = document.getElementById('status');
            status.innerHTML = 'Detectando sistema operativo...';

            setTimeout(() => {
                // Detectamos la plataforma
                const platform = window.navigator.platform.toLowerCase();

                if (platform.includes('win')) {
                    status.innerHTML = 'Descargando versión para Windows...';
                    window.location.href = '/descargar-windows';
                } else if (platform.includes('linux')) {
                    status.innerHTML = 'Descargando versión para Linux...';
                    window.location.href = '/descargar-linux';
                } else {
                    status.innerHTML = 'Sistema no compatible.';
                    alert('Lo sentimos, EAM Solutions no es compatible con tu sistema actual.');
                }
            }, 2000);
        }
    </script>
</body>

</html>
